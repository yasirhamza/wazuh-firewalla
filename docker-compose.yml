services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.14.3
    hostname: wazuh.manager
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
      - ./config/wazuh_cluster/agent.conf:/var/ossec/etc/shared/default/agent.conf:ro
      - msp_logs:/var/ossec/logs/msp:ro
      - sidecar_status:/var/ossec/logs/sidecar-status:ro
      - ./msp-poller/wazuh-config/decoders/firewalla_decoders.xml:/var/ossec/etc/decoders/firewalla_decoders.xml:ro
      - ./msp-poller/wazuh-config/rules/firewalla_rules.xml:/var/ossec/etc/rules/firewalla_rules.xml:ro
      - ./config/wazuh_decoders/windows_srp_decoders.xml:/var/ossec/etc/decoders/windows_srp_decoders.xml:ro
      - ./config/wazuh_rules/windows_srp_rules.xml:/var/ossec/etc/rules/windows_srp_rules.xml:ro
      - ./config/wazuh_rules/hunting_rules.xml:/var/ossec/etc/rules/hunting_rules.xml:ro
      - threat_intel_lists:/var/ossec/etc/lists/threat-intel
      - ./config/wazuh_lists:/var/ossec/etc/lists/srp:rw
      - ./scripts/sync-baseline.sh:/var/ossec/active-response/bin/sync-baseline.sh:ro
      - ./config/filebeat_pipeline/pipeline.json:/usr/share/filebeat/module/wazuh/alerts/ingest/pipeline.json:ro
    healthcheck:
      test: ["CMD-SHELL", "(/var/ossec/bin/wazuh-control status | grep -q 'wazuh-analysisd is running' || (rm -f /var/ossec/var/run/wazuh-analysisd-*.pid && /var/ossec/bin/wazuh-analysisd && sleep 3 && /var/ossec/bin/wazuh-control status | grep -q 'wazuh-analysisd is running')) && (/var/ossec/bin/wazuh-control status | grep -q 'wazuh-db is running' || (rm -f /var/ossec/var/run/wazuh-db-*.pid && /var/ossec/bin/wazuh-db && sleep 3 && /var/ossec/bin/wazuh-control status | grep -q 'wazuh-db is running'))"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.14.3
    hostname: wazuh.indexer
    restart: always
    stop_grace_period: 60s
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.14.3
    hostname: wazuh.dashboard
    restart: always
    ports:
      - 443:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      - wazuh.indexer
    links:
      - wazuh.indexer:wazuh.indexer
      - wazuh.manager:wazuh.manager

  msp-poller:
    build: ./msp-poller
    container_name: single-node-msp-poller
    hostname: msp-poller
    restart: always
    environment:
      - MSP_DOMAIN=${MSP_DOMAIN}
      - MSP_TOKEN=${MSP_TOKEN}
      - POLL_INTERVAL_ALARMS=300
      - POLL_INTERVAL_DEVICES=86400
      - LOG_DIR=/logs
      - STATE_DIR=/state
      - STATUS_DIR=/status
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
    volumes:
      - msp_logs:/logs
      - msp_state:/state
      - sidecar_status:/status
    depends_on:
      wazuh.manager:
        condition: service_healthy

  threat-intel:
    build: ./threat-intel
    container_name: single-node-threat-intel
    hostname: threat-intel
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - UPDATE_INTERVAL=86400
      - CDB_DIR=/lists
      - STATUS_DIR=/status
    volumes:
      - threat_intel_lists:/lists
      - sidecar_status:/status

  wazuh-mcp:
    build: ./mcp-server
    container_name: single-node-wazuh-mcp
    hostname: wazuh-mcp
    restart: unless-stopped
    environment:
      - MCP_OS_USER=${MCP_OS_USER}
      - MCP_OS_PASSWORD=${MCP_OS_PASSWORD}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8800}
      - OPENSEARCH_URL=https://wazuh.indexer:9200
      - MAX_LOG_SIZE=${MAX_LOG_SIZE:-10485760}
      - MAX_LOG_BACKUPS=${MAX_LOG_BACKUPS:-2}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-60}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-10}
    ports:
      - "127.0.0.1:${MCP_HTTP_PORT:-8800}:${MCP_HTTP_PORT:-8800}"
    volumes:
      - sidecar_status:/var/ossec/logs/sidecar-status
    depends_on:
      wazuh.indexer:
        condition: service_started
      wazuh.manager:
        condition: service_healthy

  # First-seen-domain scanner. Batch job, no LLM dependency, no HTTP.
  # Shares the wazuh-mcp image (same service-layer code) but runs a
  # dedicated entrypoint (first_seen_runner) so failures in one don't
  # affect the other. Not needed by the dashboard panel, which reads
  # the events this sidecar writes to the shared sidecar-status stream.
  first-seen-scanner:
    build: ./mcp-server
    image: single-node-wazuh-mcp
    container_name: single-node-first-seen-scanner
    hostname: first-seen-scanner
    restart: unless-stopped
    command: ["python", "-u", "-m", "src.first_seen_runner"]
    environment:
      # Reuses mcp_read since its access pattern is the same (read-only
      # over wazuh-alerts-*). MCP_API_KEY unused but required by the
      # shared config loader; any string works.
      - MCP_OS_USER=${MCP_OS_USER}
      - MCP_OS_PASSWORD=${MCP_OS_PASSWORD}
      - MCP_API_KEY=unused-by-scanner
      - OPENSEARCH_URL=https://wazuh.indexer:9200
      - MAX_LOG_SIZE=${MAX_LOG_SIZE:-10485760}
      - MAX_LOG_BACKUPS=${MAX_LOG_BACKUPS:-2}
      - FIRST_SEEN_SCAN_INTERVAL_SEC=${FIRST_SEEN_SCAN_INTERVAL_SEC:-86400}
      - FIRST_SEEN_RECENT_WINDOW=${FIRST_SEEN_RECENT_WINDOW:-last_7d}
      - FIRST_SEEN_BASELINE_DAYS=${FIRST_SEEN_BASELINE_DAYS:-90}
      - FIRST_SEEN_ENABLED=${FIRST_SEEN_ENABLED:-true}
    volumes:
      - sidecar_status:/var/ossec/logs/sidecar-status
    # Disable the HTTP healthcheck inherited from the wazuh-mcp image —
    # this service is a batch job with no HTTP server. Liveness is reported
    # via the sidecar-status JSONL heartbeat stream (rule 100503).
    healthcheck:
      disable: true
    depends_on:
      wazuh.indexer:
        condition: service_started
      wazuh.manager:
        condition: service_healthy

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
  msp_logs:
  msp_state:
  threat_intel_lists:
  sidecar_status:
